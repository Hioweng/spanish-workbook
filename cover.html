<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西班牙语练习册 - 封面</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5f1e8;
            --charcoal: #2c2c2c;
            --grey: #6b6b6b;
            --light-grey: #e8e4db;
            --accent: #8b3a3a;
            --paper: #faf8f3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', Georgia, serif;
            background: var(--cream);
            color: var(--charcoal);
            min-height: 100vh;
            line-height: 1.7;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            background: var(--paper);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            min-height: 100vh;
        }
        .cover-section {
            padding: 80px 40px;
            text-align: center;
            border-bottom: 1px solid var(--light-grey);
        }
        .cover-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: 0.05em;
            color: var(--charcoal);
        }
        .cover-subtitle {
            font-size: 16px;
            color: var(--grey);
            font-style: italic;
            margin-bottom: 40px;
        }
        .cover-accent {
            width: 80px;
            height: 3px;
            background: var(--accent);
            margin: 0 auto 40px;
        }
        .cover-stats {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-bottom: 40px;
        }
        .stat-box {
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            display: block;
        }
        .stat-label {
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--grey);
            margin-top: 4px;
        }
        .start-btn {
            display: inline-block;
            padding: 16px 40px;
            border: 2px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: all 0.25s;
        }
        .start-btn:hover {
            background: var(--accent);
            color: white;
        }
        .toc-section {
            padding: 50px 40px;
        }
        .toc-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        .toc-number {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            width: 24px;
            height: 24px;
            border: 1px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toc-title {
            font-size: 15px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--charcoal);
            font-weight: 600;
        }
        .toc-list {
            list-style: none;
            padding-left: 0;
        }
        .toc-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--light-grey);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .toc-item:last-child {
            border-bottom: none;
        }
        .toc-day {
            font-size: 14px;
            color: var(--grey);
            width: 50px;
        }
        .toc-link {
            flex: 1;
            text-decoration: none;
            color: var(--charcoal);
            font-size: 15px;
            transition: color 0.2s;
        }
        .toc-link:hover {
            color: var(--accent);
        }
        .toc-level {
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: rgba(139,58,58,0.05);
            padding: 2px 8px;
        }
        .toc-wordcount {
            font-size: 12px;
            color: var(--grey);
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--light-grey);
        }
        .pagination-btn {
            padding: 10px 20px;
            border: 1px solid var(--accent);
            color: var(--accent);
            background: transparent;
            font-family: 'Noto Serif SC', Georgia, serif;
            font-size: 13px;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pagination-btn:hover:not(:disabled) {
            background: var(--accent);
            color: white;
        }
        .pagination-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination-info {
            font-size: 13px;
            color: var(--grey);
            min-width: 100px;
            text-align: center;
        }
        .footer {
            padding: 40px;
            text-align: center;
            border-top: 1px solid var(--light-grey);
            background: var(--cream);
        }
        .footer-text {
            font-size: 12px;
            color: var(--grey);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cover-section">
            <h1 class="cover-title">西班牙语练习册</h1>
            <p class="cover-subtitle">从A1到B2，每天一篇，一年掌握6000词</p>
            <div class="cover-accent"></div>
            <div class="cover-stats">
                <div class="stat-box">
                    <span class="stat-number">365</span>
                    <span class="stat-label">Días</span>
                </div>
                <div class="stat-box">
                    <span class="stat-number">6000</span>
                    <span class="stat-label">Palabras</span>
                </div>
                <div class="stat-box">
                    <span class="stat-number">B2</span>
                    <span class="stat-label">Nivel</span>
                </div>
            </div>
            <a href="index.html" class="start-btn">开始学习</a>
        </div>

        <div class="toc-section">
            <div class="toc-header">
                <span class="toc-number">01</span>
                <span class="toc-title">Contenidos</span>
            </div>
            <ul class="toc-list" id="tocList"></ul>
            
            <div class="pagination">
                <button class="pagination-btn" id="prevPage" onclick="changePage(-1)" disabled>上一页</button>
                <span class="pagination-info" id="pageInfo">第 1 / 1 页</span>
                <button class="pagination-btn" id="nextPage" onclick="changePage(1)" disabled>下一页</button>
            </div>
        </div>

        <div class="footer">
            <p class="footer-text">每天一篇，坚持一年，轻松达到B2水平</p>
        </div>
    </div>

    <script>
        const days = [
            { day: 1, title: 'Mi primera semana en Madrid', level: 'A1+', words: 11, file: 'index.html' },
            { day: 2, title: 'Un día típico en la escuela', level: 'A1+', words: 12, file: 'day_2.html' },
            { day: 3, title: 'Compras en el mercado', level: 'A1+', words: 12, file: 'day_3.html' },
            { day: 4, title: 'Un viaje a Toledo', level: 'A1+', words: 12, file: 'day_4.html' },
            { day: 5, title: 'Mi familia', level: 'A1+', words: 12, file: 'day_5.html' },
            { day: 6, title: 'El tiempo y el clima', level: 'A1+', words: 12, file: 'day_6.html' },
            { day: 7, title: 'Pasatiempos y hobbies', level: 'A1+', words: 12, file: 'day_7.html' },
            { day: 8, title: 'Restaurantes y comida', level: 'A1+', words: 12, file: 'day_8.html' },
            { day: 9, title: 'Transporte en la ciudad', level: 'A1+', words: 12, file: 'day_9.html' },
            { day: 10, title: 'Celebraciones y festivales', level: 'A1+', words: 12, file: 'day_10.html' },
            { day: 11, title: 'Mi rutina diaria', level: 'A1+', words: 12, file: 'day_11.html' },
            { day: 12, title: 'El trabajo', level: 'A1+', words: 12, file: 'day_12.html' },
            { day: 13, title: 'Mi apartamento', level: 'A1+', words: 12, file: 'day_13.html' },
            { day: 14, title: 'La salud', level: 'A1+', words: 12, file: 'day_14.html' },
            { day: 15, title: 'Los viajes', level: 'A1+', words: 12, file: 'day_15.html' },
            { day: 16, title: 'Las compras', level: 'A1+', words: 12, file: 'day_16.html' },
            { day: 17, title: 'La educación', level: 'A1+', words: 12, file: 'day_17.html' },
            { day: 18, title: 'Los animales', level: 'A1+', words: 12, file: 'day_18.html' },
            { day: 19, title: 'La música', level: 'A1+', words: 12, file: 'day_19.html' },
            { day: 20, title: 'Los deportes', level: 'A1+', words: 12, file: 'day_20.html' },
            { day: 21, title: 'Los libros y la lectura', level: 'A1+', words: 12, file: 'day_21.html' },
            { day: 22, title: 'La tecnología', level: 'A1+', words: 12, file: 'day_22.html' },
            { day: 23, title: 'La comida y la cocina', level: 'A1+', words: 12, file: 'day_23.html' },
            { day: 24, title: 'La naturaleza', level: 'A1+', words: 12, file: 'day_24.html' },
            { day: 25, title: 'La cultura', level: 'A1+', words: 12, file: 'day_25.html' },
            { day: 26, title: 'Los amigos', level: 'A1+', words: 12, file: 'day_26.html' },
            { day: 27, title: 'Los planes', level: 'A1+', words: 12, file: 'day_27.html' },
            { day: 28, title: 'La felicidad', level: 'A1+', words: 12, file: 'day_28.html' },
            { day: 29, title: 'El tiempo', level: 'A1+', words: 12, file: 'day_29.html' },
            { day: 30, title: 'Mi vida en Madrid', level: 'A1+', words: 12, file: 'day_30.html' },
        ];

        const itemsPerPage = 30;
        let currentPage = 1;

        function renderPage() {
            const totalPages = Math.ceil(days.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, days.length);
            const pageDays = days.slice(startIndex, endIndex);

            const tocList = document.getElementById('tocList');
            tocList.innerHTML = '';

            pageDays.forEach(item => {
                const li = document.createElement('li');
                li.className = 'toc-item';
                li.innerHTML = `
                    <span class="toc-day">Day ${item.day}</span>
                    <a href="${item.file}" class="toc-link">${item.title}</a>
                    <span class="toc-level">${item.level}</span>
                    <span class="toc-wordcount">${item.words}词</span>
                `;
                tocList.appendChild(li);
            });

            document.getElementById('pageInfo').textContent = `第 ${currentPage} / ${totalPages} 页`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
        }

        function changePage(delta) {
            const totalPages = Math.ceil(days.length / itemsPerPage);
            currentPage = Math.max(1, Math.min(totalPages, currentPage + delta));
            renderPage();
        }

        renderPage();
    </script>
</body>
</html>
