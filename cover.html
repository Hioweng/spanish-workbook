        * { margin: 0; padding: 0; box-sizing: border-box; }

            background: var(--cream);
            color: var(--charcoal);
            min-height: 100vh;
            line-height: 1.7;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            background: var(--paper);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);

        }
        .cover-section {

            text-align: center;
            border-bottom: 1px solid var(--light-grey);
        }
        .cover-title {

            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: 0.05em;
            color: var(--charcoal);
        }
        .cover-subtitle {

            color: var(--grey);
            font-style: italic;
            margin-bottom: 40px;
        }
        .cover-accent {

            height: 3px;
            background: var(--accent);
            margin: 0 auto 40px;
        }
        .cover-stats {
            display: flex;
            justify-content: center;

            margin-bottom: 40px;
        }
        .stat-box {
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            display: block;
        }
        .stat-label {

            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--grey);
            margin-top: 4px;
        }
        .start-btn {

            padding: 16px 40px;
            border: 2px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: all 0.25s;
        }
        .start-btn:hover {
            background: var(--accent);
            color: white;
        }
        .toc-section {
            padding: 50px 40px;
        }
        .toc-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        .toc-number {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            width: 24px;
            height: 24px;
            border: 1px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toc-title {
            font-size: 15px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--charcoal);
            font-weight: 600;
        }
        .toc-list {
            list-style: none;
            padding-left: 0;
        }
        .toc-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--light-grey);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .toc-item:last-child {
            border-bottom: none;
        }
        .toc-day {
            font-size: 14px;
            color: var(--grey);
            width: 50px;
        }
        .toc-link {
            flex: 1;
            text-decoration: none;
            color: var(--charcoal);
            font-size: 15px;
            transition: color 0.2s;
        }
        .toc-link:hover {
            color: var(--accent);
        }
        .toc-level {
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: rgba(139,58,58,0.05);
            padding: 2px 8px;
        }
        .toc-wordcount {
            font-size: 12px;
            color: var(--grey);
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--light-grey);
        }
        .pagination-btn {
            padding: 10px 20px;
            border: 1px solid var(--accent);
            color: var(--accent);
            background: transparent;
            font-family: 'Noto Serif SC', Georgia, serif;
            font-size: 13px;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pagination-btn:hover:not(:disabled) {
            background: var(--accent);
            color: white;
        }
        .pagination-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination-info {
            font-size: 13px;
            color: var(--grey);
            min-width: 100px;
            text-align: center;
        }
        .footer {
            padding: 40px;
            text-align: center;
            border-top: 1px solid var(--light-grey);
            background: var(--cream);

            color: var(--grey);

</head>

        ];

        const itemsPerPage = 30;
        let currentPage = 1;

        function renderPage() {
            const totalPages = Math.ceil(days.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, days.length);
            const pageDays = days.slice(startIndex, endIndex);

            const tocList = document.getElementById('tocList');
            tocList.innerHTML = '';

            pageDays.forEach(item => {
                const li = document.createElement('li');
                li.className = 'toc-item';
                li.innerHTML = `
                    <span class="toc-day">Day ${item.day}</span>
                    <a href="${item.file}" class="toc-link">${item.title}</a>
                    <span class="toc-level">${item.level}</span>
                    <span class="toc-wordcount">${item.words}词</span>
                `;
                tocList.appendChild(li);
            });

            document.getElementById('pageInfo').textContent = `第 ${currentPage} / ${totalPages} 页`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
        }

        function changePage(delta) {
            const totalPages = Math.ceil(days.length / itemsPerPage);
            currentPage = Math.max(1, Math.min(totalPages, currentPage + delta));
            renderPage();
        }

        renderPage();
